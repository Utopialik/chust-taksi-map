<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borar joyni belgilash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; }
        #map { height: 85vh; width: 100%; }
        .btn-container { height: 15vh; display: flex; align-items: center; justify-content: center; background: #f8f9fa; }
        #confirm-btn { background-color: #28a745; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; width: 90%; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="btn-container"><button id="confirm-btn">🏁 Borar joyni tasdiqlash</button></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const chustLat = 40.9973, chustLon = 71.2239;

        // 🗺️ 1-Qatlam: Standart Ko'cha xaritasi (OSM)
        const kochaQatlami = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        });

        // 🛰️ 2-Qatlam: Sun'iy yo'ldosh xaritasi (Esri Satellite)
        const yoldoshQatlami = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri — Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });

        // Xaritani standart qatlam bilan yaratish
        const map = L.map('map', {
            center: [chustLat, chustLon],
            zoom: 14,
            layers: [kochaQatlami] // Default holatda ko'cha xaritasi turadi
        });

        // 🔄 Qatlamlarni almashtirish tugmasi (O'ng tepa burchakda paydo bo'ladi)
        const asosiyQatlamlar = {
            "🗺️ Oddiy xarita": kochaQatlami,
            "🛰️ Sun'iy yo'ldosh": yoldoshQatlami
        };
        L.control.layers(asosiyQatlamlar).addTo(map);

        let marker = L.marker([chustLat, chustLon], {draggable: true}).addTo(map);
        let selectedCoords = { lat: chustLat, lon: chustLon };

        marker.on('dragend', function (e) {
            const pos = marker.getLatLng(); selectedCoords.lat = pos.lat; selectedCoords.lon = pos.lng;
        });
        map.on('click', function (e) {
            marker.setLatLng(e.latlng); selectedCoords.lat = e.latlng.lat; selectedCoords.lon = e.latlng.lng;
        });

        document.getElementById('confirm-btn').addEventListener('click', () => {
            tg.sendData(JSON.stringify({ latitude: selectedCoords.lat, longitude: selectedCoords.lon }));
            tg.close();
        });
    </script>
</body>
</html>
