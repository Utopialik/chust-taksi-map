<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borar joyni belgilash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; }
        #map { height: 85vh; width: 100%; }
        .btn-container {
            height: 15vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
        }
        #confirm-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 90%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #confirm-btn:active { background-color: #1e7e34; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="btn-container">
        <button id="confirm-btn">🏁 Borar joyni tasdiqlash</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Xaritani to'liq ekranga ochish

        // Chust markazi koordinatalari
        const chustLat = 40.9973;
        const chustLon = 71.2239;

        const map = L.map('map').setView([chustLat, chustLon], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Sudraladigan Marker (Pin)
        let marker = L.marker([chustLat, chustLon], {draggable: true}).addTo(map);
        let selectedCoords = { lat: chustLat, lon: chustLon };

        marker.on('dragend', function (e) {
            const position = marker.getLatLng();
            selectedCoords.lat = position.lat;
            selectedCoords.lon = position.lng;
        });

        map.on('click', function (e) {
            marker.setLatLng(e.latlng);
            selectedCoords.lat = e.latlng.lat;
            selectedCoords.lon = e.latlng.lng;
        });

        // Tugma bosilganda koordinatani JSON ko'rinishida Python-ga qaytarish
        document.getElementById('confirm-btn').addEventListener('click', () => {
            tg.sendData(JSON.stringify({
                latitude: selectedCoords.lat,
                longitude: selectedCoords.lon
            }));
            tg.close();
        });
    </script>
</body>
</html>
